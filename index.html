<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT HUB - Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #0b0f19; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(6, 182, 212, 0.6); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-cyan-500 p-2 rounded-lg text-slate-950 neon-glow-cyan">
                    <i class="fa-solid fa-terminal text-xl"></i>
                </div>
                <span class="tech-font text-2xl font-bold tracking-wider text-cyan-400 neon-text-cyan">IT<span class="text-emerald-400">HUB</span></span>
            </div>
            
            <div class="flex items-center space-x-2">
                <div id="connection-status" class="text-xs font-mono text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span> CONNECTING DATABASE...
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl w-full mx-auto p-4 md:p-6 grow space-y-6">
        <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800/80 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-cubes text-emerald-400"></i> ศูนย์รวมลิงก์และระบบบริหารจัดการไอที
                </h1>
                <p class="text-xs text-slate-400 mt-1">ระบบดึงข้อมูลจาก Google Sheets โดยตรงแบบ Real-time คลิกเพื่อเปิดลิงก์ปลายทางในแท็บใหม่</p>
            </div>
            <div class="flex flex-wrap gap-2 text-xs">
                <button onclick="filterCategory('All')" class="px-3 py-1.5 rounded-lg bg-cyan-500 text-slate-950 font-bold border border-cyan-400/30 cursor-pointer transition-all filter-btn" id="btn-all">ทั้งหมด</button>
                <button onclick="filterCategory('Network')" class="px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white cursor-pointer transition-all filter-btn" id="btn-network">Network & Security</button>
                <button onclick="filterCategory('Server')" class="px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white cursor-pointer transition-all filter-btn" id="btn-server">Server & Cloud</button>
                <button onclick="filterCategory('External')" class="px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white cursor-pointer transition-all filter-btn" id="btn-external">เว็บภายนอก / ทั่วไป</button>
            </div>
        </div>

        <div id="frontendGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="loading-view" class="col-span-full text-center py-12">
                <i class="fa-solid fa-circle-notch text-3xl text-cyan-400 animate-spin mb-3"></i>
                <p class="text-sm text-slate-400 font-mono">กำลังซิงค์ข้อมูลจาก Google Sheets...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950 py-4 text-center text-xs text-slate-500 tech-font">
        &copy; 2026 IT HUB SYSTEM COMMAND CENTER. ALL SYSTEMS OPERATIONAL.
    </footer>

    <script>
        // ไอดีกูเกิลชีตและชื่อแผ่นงาน
        const SHEET_ID = '1linr5sA7p_huXWymTqjymeJX2fUEfQpJKewTyljS9WM';
        const SHEET_NAME = 'Links';
        // ดึงข้อมูลรูปแบบ CSV
        const FETCH_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

        let globalLinks = [];
        let currentFilter = "All";

        // ฟังก์ชันแปลงข้อมูล CSV เป็น Array Object (ปรับปรุงตัวล้างเครื่องหมายคำพูดและช่องว่าง)
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            
            // วนลูปเริ่มจากแถวที่ 2 (ข้ามหัวตาราง)
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                // แยกด้วยคอมมา โดยรองรับกรณีข้อความมีเครื่องหมายคำพูดครอบ
                const tokens = [];
                let insideQuote = false;
                let currentToken = '';
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        tokens.push(currentToken.trim());
                        currentToken = '';
                    } else {
                        currentToken += char;
                    }
                }
                tokens.push(currentToken.trim());

                if (tokens.length >= 3) {
                    // ล้างเครื่องหมายคำพูดที่อาจหลงเหลือหัวท้ายออกให้สะอาด 100%
                    const name = tokens[0].replace(/^"|"$/g, '').trim();
                    const category = tokens[1].replace(/^"|"$/g, '').trim();
                    const url = tokens[2].replace(/^"|"$/g, '').trim();
                    
                    if (name && url) {
                        result.push({ name, category, url });
                    }
                }
            }
            return result;
        }

        // ฟังก์ชันหลักในการดึงข้อมูลจาก Google Sheet
        async function fetchSheetData() {
            const grid = document.getElementById('frontendGrid');
            const statusBadge = document.getElementById('connection-status');
            
            try {
                const response = await fetch(FETCH_URL);
                if (!response.ok) throw new Error('Network Fail');
                
                const csvText = await response.text();
                globalLinks = parseCSV(csvText);
                
                // อัปเดตสถานะออนไลน์
                statusBadge.className = "text-xs font-mono text-cyan-400 bg-cyan-500/10 border border-cyan-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5";
                statusBadge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span> GOOGLE SHEET ACTIVE`;
                
                renderFrontend();
            } catch (error) {
                console.error(error);
                statusBadge.className = "text-xs font-mono text-rose-400 bg-rose-500/10 border border-rose-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5";
                statusBadge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-rose-400"></span> CONNECTION ERROR`;
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 border border-dashed border-rose-800/40 rounded-2xl bg-rose-500/5">
                        <i class="fa-solid fa-triangle-exclamation text-3xl text-rose-400 mb-2"></i>
                        <p class="text-rose-300 text-sm font-semibold">เกิดข้อผิดพลาดในการดึงข้อมูล</p>
                        <p class="text-slate-500 text-xs mt-1">กรุณาตรวจสอบว่าเปิดสิทธิ์การแชร์ Google Sheets เป็น "ทุกคนที่มีลิงก์" แล้วหรือยัง</p>
                    </div>`;
            }
        }

        // ฟังก์ชันช่วยจัดสไตล์ตามหมวดหมู่
        function getCategoryStyle(category) {
            // ล้างช่องว่างและแปลงเป็นพิมพ์เล็กเพื่อเทียบเคียงได้แม่นยำขึ้น
            const cleanCategory = category.trim().toLowerCase();
            switch(cleanCategory) {
                case 'network': 
                    return { icon: 'fa-network-wired', color: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'hover:border-cyan-500/60', label: 'Network & Security' };
                case 'server': 
                    return { icon: 'fa-server', color: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'hover:border-emerald-500/60', label: 'Server & Cloud' };
                case 'external': 
                    return { icon: 'fa-globe', color: 'text-fuchsia-400', bg: 'bg-fuchsia-500/10', border: 'hover:border-fuchsia-500/60', label: 'External Website' };
                default: 
                    return { icon: 'fa-cubes', color: 'text-amber-400', bg: 'bg-amber-500/10', border: 'hover:border-amber-500/60', label: category || 'General / Tool' };
            }
        }

        // ฟังก์ชันเรนเดอร์การ์ดรายการระบบไอทีหน้าเว็บ (ปรับปรุงระบบคัดกรองตัวกรอง)
        function renderFrontend() {
            const grid = document.getElementById('frontendGrid');
            grid.innerHTML = '';

            // ทำความสะอาดและเช็กเงื่อนไขการกรองหมวดหมู่ให้ปลอดภัย
            const filteredData = currentFilter === "All" 
                ? globalLinks 
                : globalLinks.filter(item => item.category.trim().toLowerCase() === currentFilter.trim().toLowerCase());

            if (filteredData.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 border border-dashed border-slate-800 rounded-2xl"><i class="fa-solid fa-folder-open text-3xl text-slate-600 mb-2"></i><p class="text-slate-400 text-sm">ไม่พบรายการระบบในหมวดหมู่นี้ (เพิ่มข้อมูลในแผ่นชีตได้เลย)</p></div>`;
                return;
            }

            filteredData.forEach(item => {
                const style = getCategoryStyle(item.category);
                const isLocalIP = /^(https?:\/\/)?(127\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|10\.)/i.test(item.url);
                const tagBadge = isLocalIP 
                    ? `<span class="text-[10px] font-mono tracking-wide bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded border border-amber-500/20 ml-2">INTERNAL LAN</span>`
                    : `<span class="text-[10px] font-mono tracking-wide bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 ml-2">PUBLIC URL</span>`;

                grid.insertAdjacentHTML('beforeend', `
                    <a href="${item.url}" target="_blank" class="group bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex items-center space-x-3 transition-all duration-300 hover:bg-slate-900/80 ${style.border}">
                        <div class="${style.bg} ${style.color} w-12 h-12 rounded-lg flex items-center justify-center text-xl border border-slate-800 shrink-0 group-hover:scale-105 transition-transform">
                            <i class="fa-solid ${style.icon}"></i>
                        </div>
                        <div class="overflow-hidden w-full">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] font-mono tracking-wider ${style.color} uppercase font-bold">${style.label}</span>
                                ${tagBadge}
                            </div>
                            <h3 class="text-sm font-semibold text-slate-200 group-hover:text-cyan-300 transition-colors truncate mt-0.5">${item.name}</h3>
                            <p class="text-xs text-slate-500 truncate font-mono mt-0.5 flex items-center gap-1">
                                <i class="fa-solid fa-link text-[10px]"></i> ${item.url}
                            </p>
                        </div>
                    </a>`);
            });
        }

        // ฟังก์ชันสลับเมนูและเปลี่ยนสถานะปุ่มตัวกรอง
        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white cursor-pointer transition-all filter-btn";
            });

            const activeBtn = document.getElementById(`btn-${category.toLowerCase()}`);
            if (activeBtn) {
                activeBtn.className = "px-3 py-1.5 rounded-lg bg-cyan-500 text-slate-950 font-bold border border-cyan-400/30 cursor-pointer transition-all filter-btn shadow-[0_0_10px_rgba(6,182,212,0.3)]";
            }
            renderFrontend();
        }

        // เรียกใช้งานฟังก์ชันดึงข้อมูลทันทีเมื่อเปิดหน้าจอ
        fetchSheetData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <base target="_top">
      <style>
         body {
            margin: 0;
            overflow: hidden;
         }
         /* สร้างกรอบเพื่อดันแถบแบนเนอร์ด้านบนของ Google ให้หลุดขอบจอไป */
         .iframe-container {
            position: absolute;
            top: -150px; /* ขยับตัว iframe ขึ้นไปข้างบนเพื่อซ่อนแถบเตือน */
            left: 0;
            width: 100%;
            height: calc(100% + 150px); /* เพิ่มความสูงชดเชยส่วนที่ดันขึ้นไป */
         }
         iframe {
            width: 100%;
            height: 100%;
            border: 0;
         }
      </style>
   </head>
   <body>
      <div class="iframe-container">
         <iframe src="https://script.google.com/macros/s/AKfycbxr3iSsmxnTd1W0h50vdD1Uy8NW7jGfT2V2TUbfr2AAgHRcL1Duf-sR6hpTCsEkHp0Z/exec"></iframe>
      </div>
   </body>
</html>

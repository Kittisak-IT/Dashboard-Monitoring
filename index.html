<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT HUB | COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .tech-card { background-color: #161b22; border: 1px solid #30363d; transition: all 0.25s ease; }
        .tech-card:hover { border-color: #58a6ff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8">

    <div class="max-w-6xl w-full mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-gray-800 pb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-circle-nodes text-blue-400"></i> IT HUB <span class="text-gray-500 font-light">| DATA CENTER</span>
                </h1>
                <div class="flex items-center gap-2 mt-1.5">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                    <p id="status-text" class="text-xs font-mono text-amber-400 uppercase tracking-wider">กำลังเชื่อมต่อระบบฐานข้อมูล...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                <div class="text-right hidden md:block">
                    <p class="text-[10px] text-gray-500 font-mono">LOCATION NODE</p>
                    <p class="text-xs font-semibold text-gray-300">KANCHANADIT (KDHOS)</p>
                </div>
                <button onclick="fetchWorkspaceData()" class="p-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white rounded-lg border border-gray-700 transition-colors">
                    <i class="fa-solid fa-arrow-rotate-right text-sm"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="tech-card p-4 rounded-xl">
                <p class="text-[10px] font-mono text-gray-500 uppercase tracking-wider">ระบบทั้งหมด</p>
                <p id="stat-total" class="text-2xl font-bold text-white mt-1">-</p>
            </div>
            <div class="tech-card p-4 rounded-xl">
                <p class="text-[10px] font-mono text-cyan-400 uppercase tracking-wider">NETWORK NODE</p>
                <p id="stat-network" class="text-2xl font-bold text-white mt-1">-</p>
            </div>
            <div class="tech-card p-4 rounded-xl">
                <p class="text-[10px] font-mono text-emerald-400 uppercase tracking-wider">EXTERNAL PORTAL</p>
                <p id="stat-external" class="text-2xl font-bold text-white mt-1">-</p>
            </div>
            <div class="tech-card p-4 rounded-xl">
                <p class="text-[10px] font-mono text-purple-400 uppercase tracking-wider">API LINK STATUS</p>
                <p id="stat-latency" class="text-sm font-bold text-amber-400 mt-2 font-mono">WAITING</p>
            </div>
        </div>

        <div id="card-output-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-24 font-mono text-xs text-gray-500 border border-dashed border-gray-800 rounded-2xl">
                <i class="fa-solid fa-spinner animate-spin text-xl mb-3 text-blue-500"></i><br>
                กำลังโหลดข้อมูลระบบจาก GOOGLE APPS SCRIPT...
            </div>
        </div>
    </div>

    <footer class="text-center text-[10px] text-gray-600 font-mono mt-16 pt-6 border-t border-gray-900/60">
        IT HUB DATA REPLICATION MANAGER V2.5 // NODE_STATUS: OPERATIONAL
    </footer>

    <script>
        // 🔗 ดึงท่อตรงที่พี่ส่งมาเชื่อมต่อระบบเรียบร้อยแล้วครับ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxr3iSsmxnTd1W0h50vdD1Uy8NW7jGfT2V2TUbfr2AAgHRcL1Duf-sR6hpTCsEkHp0Z/exec";

        async function fetchWorkspaceData() {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            const latency = document.getElementById('stat-latency');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const jsonResult = await response.json();
                
                if (jsonResult.status === "success") {
                    // เมื่อเชื่อมต่อผ่านฉลุย ปรับสถานะเป็นสีเขียว
                    dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                    txt.innerText = "🟢 SYSTEM ONLINE // SECURE API COUPLING";
                    txt.className = "text-xs font-mono text-emerald-400 mt-1.5 tracking-wider";
                    latency.innerText = "STABLE";
                    latency.className = "text-lg font-bold text-emerald-400 mt-1 font-mono";
                    
                    // สั่งการสร้างแผงการ์ด
                    buildInterfaceCards(jsonResult.data);
                    computeMetrics(jsonResult.data);
                } else {
                    throw new Error(jsonResult.message);
                }
            } catch (err) {
                dot.className = "w-2 h-2 rounded-full bg-rose-500";
                txt.innerText = "🔴 ERROR // CONNECTION DESYNCHRONIZED";
                txt.className = "text-xs font-mono text-rose-500 mt-1.5 tracking-wider";
                latency.innerText = "FAILED";
                latency.className = "text-lg font-bold text-rose-500 mt-1 font-mono";
                
                document.getElementById('card-output-grid').innerHTML = `
                    <div class="col-span-full p-6 text-center border border-rose-950 bg-rose-950/20 text-rose-400 rounded-xl font-mono text-xs">
                        [CRITICAL ERROR] ไม่สามารถดึงข้อมูลได้ กรุณาตรวจสอบสิทธิ์การตั้งค่าสคริปต์ (ต้องเป็น Anyone)
                    </div>`;
            }
        }

        function computeMetrics(dataset) {
            document.getElementById('stat-total').innerText = dataset.length;
            document.getElementById('stat-network').innerText = dataset.filter(item => item.category.toLowerCase().includes('net')).length;
            document.getElementById('stat-external').innerText = dataset.filter(item => item.category.toLowerCase().includes('ext')).length;
        }

        function buildInterfaceCards(items) {
            const gridContainer = document.getElementById('card-output-grid');
            if (!items || items.length === 0) {
                gridContainer.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 font-mono text-xs">ไม่พบข้อมูลใน Google Sheets</div>`;
                return;
            }

            gridContainer.innerHTML = items.map(item => {
                const catLower = item.category.toLowerCase();
                let layoutIcon = "fa-square-rss"; // ไอคอนมาตรฐาน
                let badgeStyle = "text-purple-400 bg-purple-950/40 border-purple-900/60";

                // แยกไอคอนตามหมวดหมู่ในชีตของพี่ช่างโท
                if (catLower.includes("net")) {
                    layoutIcon = "fa-shield-halved"; // หมวด Network
                    badgeStyle = "text-cyan-400 bg-cyan-950/40 border-cyan-900/60";
                } else if (catLower.includes("ext")) {
                    layoutIcon = "fa-globe"; // หมวด External
                    badgeStyle = "text-emerald-400 bg-emerald-950/40 border-emerald-900/60";
                }

                return `
                    <a href="${item.url}" target="_blank" class="tech-card p-5 rounded-xl flex flex-col justify-between group">
                        <div class="flex justify-between items-start mb-5">
                            <div class="w-10 h-10 rounded-lg bg-gray-800 border border-gray-700 flex items-center justify-center text-blue-400 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-500 transition-all">
                                <i class="fa-solid ${layoutIcon} text-base"></i>
                            </div>
                            <span class="text-[10px] font-mono border px-2 py-0.5 rounded tracking-widest font-semibold uppercase ${badgeStyle}">
                                ${item.category}
                            </span>
                        </div>
                        <div>
                            <h3 class="text-sm font-semibold text-white group-hover:text-blue-400 transition-colors mb-1.5 truncate">
                                ${item.name}
                            </h3>
                            <div class="flex items-center gap-1.5 text-xs font-mono text-gray-500 group-hover:text-gray-400 transition-colors">
                                <i class="fa-solid fa-link text-[10px]"></i>
                                <span class="truncate">${item.url}</span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        window.onload = fetchWorkspaceData;
    </script>
</body>
</html>

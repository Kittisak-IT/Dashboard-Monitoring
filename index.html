<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT HUB - Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #0b0f19; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(6, 182, 212, 0.6); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-cyan-500 p-2 rounded-lg text-slate-950 neon-glow-cyan">
                    <i class="fa-solid fa-terminal text-xl"></i>
                </div>
                <span class="tech-font text-2xl font-bold tracking-wider text-cyan-400 neon-text-cyan">IT<span class="text-emerald-400">HUB</span></span>
            </div>
            <span class="text-xs font-mono text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/30 animate-pulse">● LIVE DATABASE</span>
        </div>
    </nav>

    <div id="loading-screen" class="grow flex flex-col justify-center items-center gap-3">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs font-mono text-cyan-400 tracking-widest">FETCHING DATA...</p>
    </div>

    <main id="frontend-panel" class="hidden max-w-7xl w-full mx-auto p-4 md:p-6 grow space-y-6">
        <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800/80">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-cubes text-emerald-400"></i> ศูนย์รวมลิงก์และระบบบริหารจัดการ
            </h1>
            <p class="text-xs text-slate-400 mt-1">ข้อมูลถูกดึงจาก Google Sheets โดยตรงแบบ Real-time หากต้องการเพิ่มหรือแก้ไขลิงก์ ให้แก้ไขในไฟล์สเปรดชีตหลักได้เลยครับ</p>
        </div>
        <div id="frontendGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950 py-4 text-center text-xs text-slate-500 tech-font">
        &copy; 2026 IT HUB SYSTEM COMMAND CENTER.
    </footer>

    <script>
        // 🚨 [สำคัญมาก] เอาลิงก์ CSV ที่ได้จากการสั่ง Publish to web ของ Google Sheets มาวางแทนที่ตรงนี้ครับ!
        const CSV_URL = "วางลิงก์_Publish_แบบ_CSV_ตรงนี้ครับ";

        async function fetchCSVData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error("Fetch failed");
                const csvText = await response.text();
                
                // แปลงข้อมูลข้อความ CSV ออกมาเป็น Object อาเรย์
                const rows = csvText.split("\n").map(row => row.split(","));
                const dataList = [];
                
                // ข้ามแถวที่ 1 (หัวตาราง: name, category, url) เริ่มอ่านที่แถว 2
                for(let i = 1; i < rows.length; i++) {
                    if(rows[i][0] && rows[i][2]) {
                        dataList.push({
                            name: rows[i][0].replace(/['"']/g, '').trim(),
                            category: rows[i][1].replace(/['"']/g, '').trim(),
                            url: rows[i][2].replace(/['"']/g, '').trim()
                        });
                    }
                }
                
                renderGrid(dataList);
            } catch (error) {
                document.getElementById('frontendGrid').innerHTML = `<div class="col-span-full text-center py-12 border border-dashed border-rose-800 rounded-2xl"><p class="text-rose-400 text-sm">⚠️ ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ กรุณาเช็กสิทธิ์การตั้งค่าเปิด Publish to Web</p></div>`;
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('frontend-panel').style.display = 'block';
            }
        }

        function getCategoryStyle(category) {
            switch(category.toLowerCase()) {
                case 'network': return { icon: 'fa-network-wired', color: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'hover:border-cyan-500/60' };
                case 'server': return { icon: 'fa-server', color: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'hover:border-emerald-500/60' };
                case 'database': return { icon: 'fa-database', color: 'text-amber-400', bg: 'bg-amber-500/10', border: 'hover:border-amber-500/60' };
                default: return { icon: 'fa-code', color: 'text-purple-400', bg: 'bg-purple-500/10', border: 'hover:border-purple-500/60' };
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('frontendGrid');
            grid.innerHTML = items.length === 0 ? `<div class="col-span-full text-center py-12 border border-dashed border-slate-800 rounded-2xl"><p class="text-slate-400 text-sm">ยังไม่มีข้อมูลในตาราง</p></div>` : '';
            
            items.forEach(item => {
                const style = getCategoryStyle(item.category);
                grid.insertAdjacentHTML('beforeend', `
                    <a href="${item.url}" target="_blank" class="group bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex items-center space-x-3 transition-all duration-300 hover:bg-slate-900 ${style.border}">
                        <div class="${style.bg} ${style.color} w-11 h-11 rounded-lg flex items-center justify-center text-lg border border-slate-800 group-hover:scale-105 transition-transform">
                            <i class="fa-solid ${style.icon}"></i>
                        </div>
                        <div class="overflow-hidden">
                            <span class="text-xs font-mono tracking-wider ${style.color} uppercase">${item.category}</span>
                            <h3 class="text-sm font-semibold text-slate-200 group-hover:text-white transition-colors truncate">${item.name}</h3>
                            <p class="text-xs text-slate-500 truncate font-mono mt-0.5">${item.url}</p>
                        </div>
                    </a>`);
            });
            
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('frontend-panel').style.display = 'block';
        }

        fetchCSVData();
    </script>
</body>
</html>
